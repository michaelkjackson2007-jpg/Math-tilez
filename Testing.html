<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Piano Master</title>
    <style>
      body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: sans-serif;
}

#level-menu {
    width: 100%; height: 100%;
    background: linear-gradient(to bottom, #ff47da, #7a00ff);
    overflow-y: auto;
    padding: 20px;
    box-sizing: border-box;
}

.menu-title { text-align: center; color: white; font-size: 32px; }

.level-card {
    background: rgba(255, 255, 255, 0.2);
    margin: 10px 0;
    padding: 20px;
    border-radius: 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
}

.play-btn {
    background: #00ff00;
    border: none; padding: 10px 20px;
    border-radius: 20px; font-weight: bold;
}

#game-screen {
    width: 100%; height: 100%;
    position: relative;
    background: #ff47da;
}

#lane-container {
    display: flex;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.3);
}

.lane {
    flex: 1;
    border-right: 1px solid rgba(255,255,255,0.1);
    position: relative;
}

.tile {
    position: absolute;
    width: 100%; height: 160px;
    background: #1a1a1a;
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 35px; font-weight: bold;
    box-shadow: inset 0 0 10px rgba(255,255,255,0.2);
}

#score-display {
    position: absolute; top: 10%; width: 100%;
    text-align: center; font-size: 80px;
    color: red; z-index: 10; pointer-events: none;
}

#start-btn {
    position: absolute; bottom: 10%; left: 50%;
    transform: translateX(-50%);
    padding: 20px 50px; font-size: 24px;
    background: black; color: white; border: 2px solid white;
    z-index: 20;
}

.hidden { display: none !important; }

    </style>
</head>
<body>
  <link rel="manifest" href="manifest.json">

    <div id="level-menu">
        <h1 class="menu-title">MATH PIANO</h1>
        <div id="levels-list"></div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="score-display">0</div>
        <div id="lane-container">
            <div class="lane" id="lane-0"></div>
            <div class="lane" id="lane-1"></div>
            <div class="lane" id="lane-2"></div>
            <div class="lane" id="lane-3"></div>
        </div>
        <button id="start-btn" onclick="startActiveGame()">START</button>
    </div>

    <script>
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let currentLevel = 1;
let nextTarget = 0;
let gameActive = false;
let activeTiles = [];
let spawnTimer = 0;
let speed = 8; // High speed
let spawnRate = 25; // Frequent tiles

function playNote(freq) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
}

// Build Level Menu
const list = document.getElementById('levels-list');
for(let i=1; i<=20; i++) {
    const div = document.createElement('div');
    div.className = 'level-card';
    div.innerHTML = `<span>Level ${i}</span><button class="play-btn" onclick="goToGame(${i})">PLAY</button>`;
    list.appendChild(div);
}

function goToGame(lvl) {
    currentLevel = lvl;
    nextTarget = lvl;
    document.getElementById('level-menu').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
}

function startActiveGame() {
    document.getElementById('start-btn').classList.add('hidden');
    gameActive = true;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    requestAnimationFrame(gameLoop);
}

function spawnTile() {
    const correctLane = Math.floor(Math.random() * 4);
    
    // Create Correct Tile
    createTile(nextTarget, correctLane);
    
    // Create "Confusion" Decoy in a different lane
    const decoyLane = (correctLane + Math.floor(Math.random()*3) + 1) % 4;
    const decoyVal = nextTarget + (Math.random() > 0.5 ? 1 : -1);
    if(decoyVal !== nextTarget) createTile(decoyVal, decoyLane);

    nextTarget += currentLevel;
}

function createTile(val, laneIdx) {
    const el = document.createElement('div');
    el.className = 'tile';
    el.innerText = val;
    el.style.top = "-200px";
    document.getElementById(`lane-${laneIdx}`).appendChild(el);

    const obj = { el, y: -200, val, clicked: false };
    el.onclick = () => handleTap(obj);
    el.ontouchstart = (e) => { e.preventDefault(); handleTap(obj); };
    activeTiles.push(obj);
}

function handleTap(tile) {
    if(!gameActive || tile.clicked) return;
    const expected = (parseInt(document.getElementById('score-display').innerText) || 0) + currentLevel;

    if(tile.val === expected) {
        tile.clicked = true;
        tile.el.style.background = "#555";
        document.getElementById('score-display').innerText = tile.val;
        playNote(200 + (tile.val * 2));
        if(tile.val >= 100) endGame("WINNER!");
    } else {
        endGame("WRONG TILE!");
    }
}

function gameLoop() {
    if(!gameActive) return;
    spawnTimer++;
    if(spawnTimer % spawnRate === 0 && nextTarget <= 110) spawnTile();

    for(let i=activeTiles.length-1; i>=0; i--) {
        let t = activeTiles[i];
        t.y += speed;
        t.el.style.top = t.y + "px";

        if(t.y > window.innerHeight) {
            const expected = (parseInt(document.getElementById('score-display').innerText) || 0) + currentLevel;
            if(!t.clicked && t.val === expected) {
                endGame("MISSED ONE!");
                return;
            }
            t.el.remove();
            activeTiles.splice(i, 1);
        }
    }
    requestAnimationFrame(gameLoop);
}

function endGame(msg) {
    gameActive = false;
    alert(msg);
    location.reload();
}
function spawnTile() {
    // Logic: Only spawn if we haven't reached the "Hundred Family" limit
    if (nextTarget > 100 + currentLevel) return; 

    const correctLane = Math.floor(Math.random() * 4);
    createTile(nextTarget, correctLane);
    
    // Confusion: Spawn a decoy that is NOT the next target
    const decoyLane = (correctLane + 1) % 4;
    const decoyVal = nextTarget + (Math.random() > 0.5 ? 2 : -1); 
    createTile(decoyVal, decoyLane);

    nextTarget += currentLevel;
}


    </script>
</body>
</html>
